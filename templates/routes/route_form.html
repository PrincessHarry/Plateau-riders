{% extends 'base.html' %}
{% block title %}Add Route — Plateau Riders{% endblock %}
{% block content %}
<div class="bg-black text-white py-8">
    <div class="max-w-2xl mx-auto px-4">
        <a href="/routes/" class="text-gray-400 text-sm hover:text-white">← Back to Routes</a>
        <h1 class="font-display text-2xl font-bold mt-2">Add New Route</h1>
    </div>
</div>
<div class="max-w-2xl mx-auto px-4 py-8">
    <div class="bg-white border border-gray-200 rounded-2xl p-8 shadow-sm">
        <form method="POST">
            {% csrf_token %}
            <div class="space-y-5">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Origin *</label>
                        {{ form.origin }}
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Destination *</label>
                        {{ form.destination }}
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Base Price (₦)</label>
                    {{ form.base_price }}
                </div>
                <div class="flex items-center gap-2">
                    {{ form.is_active }}
                    <label class="text-sm font-semibold text-gray-700">Active (visible to passengers)</label>
                </div>
            </div>
            <div class="mt-8 flex gap-3">
                <button type="submit" class="btn-primary px-8">Save & Add Stops</button>
                <a href="/routes/" class="btn-secondary px-8">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
